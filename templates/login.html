{% extends 'base.html' %}
{% block title %}Login | RentWheels{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🚗</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your RentWheels account</p>
    </div>
    <form method="POST">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
      <button type="submit" class="auth-submit">Sign In →</button>
    </form>
    <div class="auth-footer">New here? <a href="{{ url_for('register') }}">Create an account</a></div>
  </div>
</div>
{% endblock %}
