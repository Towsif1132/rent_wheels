{% extends 'base.html' %}
{% block title %}Login | RentWheels{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-container">
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>
    <form method="POST">
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="john@example.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
      <button type="submit" class="btn-submit">Login</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
