{% extends 'base.html' %}
{% block title %}Login | RentWheels{% endblock %}
{% block content %}
<div class="auth-wrapper auth-login-wrapper">
  <div class="auth-container auth-login-card">
    <div class="auth-login-icon" aria-hidden="true">🚘</div>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your RentWheels account</p>
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-submit">Sign In →</button>
    </form>
    <p class="auth-switch">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
