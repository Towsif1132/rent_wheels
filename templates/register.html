{% extends 'base.html' %}
{% block title %}Register | RentWheels{% endblock %}
{% block content %}
<div class="auth-wrapper auth-register-wrapper">
  <div class="auth-container auth-register-card">
    <div class="auth-register-icon" aria-hidden="true">✨</div>
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join thousands of happy renters</p>
    <form method="POST" id="registerForm" class="auth-register-form">
      <div class="auth-register-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="+880 1234 567890" required>
        </div>
        <div class="form-group full-span">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" id="password" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </div>
        <div class="form-group full-span">
          <label>Account Role</label>
          <select name="role" title="Select account role"><option value="customer">Customer</option><option value="admin">Admin</option></select>
        </div>
      </div>
      <p id="matchError" class="error-text hidden-error">⚠ Passwords do not match.</p>
      <button type="submit" class="btn-submit">Create Account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
