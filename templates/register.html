{% extends 'base.html' %}
{% block title %}Register | RentWheels{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-container">
    <h2>Create Account</h2>
    <p class="auth-subtitle">Join us today and start renting</p>
    <form method="POST" id="registerForm">
      <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="John Doe" required></div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="john@example.com" required></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" name="phone" placeholder="+880 1234 567890" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" id="password" placeholder="Min 6 characters" required></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="Repeat password" required></div>
      <div class="form-group">
        <label>Account Role</label>
        <select name="role"><option value="customer">Customer</option><option value="admin">Admin</option></select>
      </div>
      <p id="matchError" class="error-text" style="display:none">⚠ Passwords do not match.</p>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
  </div>
</div>
{% endblock %}
