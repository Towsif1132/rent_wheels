{% extends 'base.html' %}
{% block title %}Register | RentWheels{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">✨</div>
      <h2>Create Account</h2>
      <p>Join thousands of happy renters</p>
    </div>
    <form method="POST" id="registerForm">
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="John Doe" required></div>
        <div class="form-group"><label>Phone</label><input type="tel" name="phone" placeholder="+880 1234 567890" required></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required></div>
      <div class="form-row">
        <div class="form-group"><label>Password</label><input type="password" name="password" id="password" placeholder="Min 6 characters" required></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="Repeat password" required></div>
      </div>
      <div class="form-group">
        <label>Account Role</label>
        <select name="role"><option value="customer">Customer</option><option value="admin">Admin</option></select>
      </div>
      <p id="matchError" class="err-text" style="display:none">⚠ Passwords do not match.</p>
      <button type="submit" class="auth-submit">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
